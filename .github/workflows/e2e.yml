name: e2e

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'live/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'live/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k8s-game-e2e:
    name: kind + mission audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            dashboard/package-lock.json

      - uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Install kind
        run: |
          curl -fsSL -o ./kind "https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create kind cluster
        run: |
          kind create cluster --name kubequest --wait 120s
          kubectl create namespace kubequest
          kubectl label namespace kubequest app=kubequest --overwrite

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix server
          npm ci --prefix dashboard
          npm run build:ui

      - name: Build telemetry image into kind
        run: npm run build:telemetry

      - name: Run e2e mission audit
        run: npm run audit

      - name: Cluster dump on failure
        if: failure()
        run: |
          kubectl get all,cm -n kubequest -o wide || true
          kubectl describe pods -n kubequest || true
          kind export logs ./kind-logs --name kubequest || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: kind-logs
          path: kind-logs/
          if-no-files-found: ignore

      - if: always()
        run: kind delete cluster --name kubequest || true
