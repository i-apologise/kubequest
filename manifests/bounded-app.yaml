apiVersion: apps/v1
kind: Deployment
metadata:
  name: bounded-app
  namespace: kubequest
  labels:
    app: bounded-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bounded-app
  template:
    metadata:
      labels:
        app: bounded-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
