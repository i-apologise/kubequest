apiVersion: v1
kind: Pod
metadata:
  name: messenger
  namespace: kubequest
  labels:
    app: messenger
spec:
  restartPolicy: Never
  containers:
    - name: messenger
      image: busybox:1.36
      command: ["sleep", "3600"]
      env:
        - name: MESSAGE
          valueFrom:
            configMapKeyRef:
              name: quest-config
              key: MESSAGE
